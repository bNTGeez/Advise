services:
  db:
    image: pgvector/pgvector:pg17
    container_name: advise-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: advise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d advise"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
